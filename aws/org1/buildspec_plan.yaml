version: 0.2

# See https://docs.aws.amazon.com/codebuild/latest/userguide/build-spec-ref.html

env:
  shell: bash
  parameter-store:
    TF_VAR_codeconnection_deployment_builds: TF_VAR_codeconnection_deployment_builds
    TF_VAR_aws_account_id_management: TF_VAR_aws_account_id_management
    TF_VAR_aws_account_id_security_aggregator: TF_VAR_aws_account_id_security_aggregator
    TF_VAR_aws_account_id_security_cloudtrail: TF_VAR_aws_account_id_security_cloudtrail
    TF_VAR_aws_account_id_sandbox_bedrock: TF_VAR_aws_account_id_sandbox_bedrock
    TF_VAR_aws_account_id_deployment_builds: TF_VAR_aws_account_id_deployment_builds
    TF_VAR_slack_team_name: TF_VAR_slack_team_name
  # secrets-manager:
  #   key: secret-id:json-key:version-stage:version-id

phases:
  install:
    # runtime-versions:
    #   # See https://docs.aws.amazon.com/codebuild/latest/userguide/available-runtimes.html
    #   python: 3.13
    commands:
      - bash ./aws/org1/install.sh
      - terraform version

  pre_build:
    commands:
      - bash .github/tf.sh $WORKSPACE_PATH validate

  build:
    commands:
      - bash .github/tf.sh $WORKSPACE_PATH plan

  post_build:
    commands:
      - bash ./aws/org1/post_build.sh $WORKSPACE_PATH
